<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563EB" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('theme');
          const theme =
            savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch {}
      })();
    </script>
    <title data-i18n="forgot.page.title">Forgot Password — TempMail</title>
    <meta
      name="description"
      data-i18n-content="forgot.page.description"
      content="Request a password reset link for your TempMail account."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/css/core/tokens.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/reset.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/base.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/utilities.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/components.css?v=20260324" />
    <link rel="stylesheet" href="/css/shells/auth-shell.css?v=20260324b" />
    <link rel="stylesheet" href="/css/pages/login.css?v=20260324c" />
  </head>
  <body class="auth-shell bg-glow">
    <button type="button" id="theme-toggle" class="theme-toggle-fab" aria-label="Toggle theme" title="Toggle theme">
      <i class="fa-solid fa-moon"></i>
      <span class="theme-toggle-label" data-i18n="app.theme">Theme</span>
    </button>

    <header class="topbar">
      <a href="/" class="topbar-logo">
        <div class="topbar-logo-icon">📬</div>
        <span>TempMail</span>
      </a>
      <div class="topbar-right">
        <a class="topbar-link" href="/">Inbox</a>
        <a class="topbar-link topbar-link-primary" href="/submit-domain">Submit Domain</a>
        <div class="language-dropdown topbar-language" data-language-switcher aria-label="Language switcher" data-i18n-aria-label="lang.switcher">
          <button type="button" class="language-trigger" data-language-trigger aria-haspopup="menu" aria-expanded="false">
            <span data-language-current>English</span>
            <i class="fa-solid fa-chevron-down"></i>
          </button>
          <div class="language-menu" data-language-menu role="menu"></div>
        </div>
      </div>
    </header>

    <main class="auth-page-wrap">
      <div class="auth-page">
        <section class="card auth-card">
          <h1 class="form-title" data-i18n="login.forgot.title">Reset your password</h1>
          <p class="form-subtitle" data-i18n="login.forgot.subtitle">Enter your account email and we will send you a password reset link.</p>
          <div class="alert" id="forgot-alert"></div>
          <form id="forgot-password-form">
            <div class="field">
              <label for="forgot-email" data-i18n="common.email">Email</label>
              <input id="forgot-email" class="input" type="email" placeholder="you@example.com" data-i18n-placeholder="common.email_placeholder" required autocomplete="email" />
            </div>
            <div class="forgot-password-back">
              <a class="text-button" href="/login">
                <i class="fa-solid fa-arrow-left"></i>
                <span data-i18n="forgot.back_login">Back to login</span>
              </a>
            </div>
            <div class="forgot-password-actions">
              <button class="btn-primary auth-submit forgot-submit" type="submit" id="forgot-btn" data-i18n="login.forgot.submit">Send reset link</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="/js/pages/forgot-password.js?v=20260324"></script>
  </body>
</html>
