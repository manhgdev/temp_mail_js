<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563EB" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('theme');
          const theme =
            savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch {}
      })();
    </script>
    <title data-i18n="login.page.title">Login — TempMail</title>
    <meta
      name="description"
      data-i18n-content="login.page.description"
      content="Sign in or register a TempMail account to manage your temporary inboxes."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/css/core/tokens.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/reset.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/base.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/utilities.css?v=20260324" />
    <link rel="stylesheet" href="/css/core/components.css?v=20260324" />
    <link rel="stylesheet" href="/css/shells/auth-shell.css?v=20260324b" />
    <link rel="stylesheet" href="/css/pages/login.css?v=20260324b" />
  </head>
  <body class="auth-shell bg-glow">
    <button type="button" id="theme-toggle" class="theme-toggle-fab" aria-label="Toggle theme" title="Toggle theme">
      <i class="fa-solid fa-moon"></i>
      <span class="theme-toggle-label" data-i18n="app.theme">Theme</span>
    </button>

    <header class="topbar">
      <a href="/" class="topbar-logo">
        <div class="topbar-logo-icon">📬</div>
        <span>TempMail</span>
      </a>
      <div class="topbar-right">
        <a class="topbar-link" href="/">Inbox</a>
        <a class="topbar-link topbar-link-primary" href="/submit-domain">Submit Domain</a>
        <div class="language-dropdown topbar-language" data-language-switcher aria-label="Language switcher" data-i18n-aria-label="lang.switcher">
          <button type="button" class="language-trigger" data-language-trigger aria-haspopup="menu" aria-expanded="false">
            <span data-language-current>English</span>
            <i class="fa-solid fa-chevron-down"></i>
          </button>
          <div class="language-menu" data-language-menu role="menu"></div>
        </div>
      </div>
    </header>

    <main class="auth-page-wrap">
      <div class="auth-page">
        <section class="card auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" data-auth-tab="login" data-i18n="login.tab.login">Login</button>
            <button class="auth-tab" id="tab-register" data-auth-tab="register" data-i18n="login.tab.register">Register</button>
          </div>

          <div class="panel active" id="panel-login">
            <h1 class="form-title" data-i18n="login.title">Welcome back</h1>
            <p class="form-subtitle" data-i18n="login.subtitle">Sign in to manage your temporary inboxes.</p>
            <div class="alert" id="login-alert"></div>
            <form id="login-form">
              <div class="field">
                <label for="login-email" data-i18n="common.email">Email</label>
                <input id="login-email" class="input" type="email" placeholder="you@example.com" data-i18n-placeholder="common.email_placeholder" required autocomplete="email" />
              </div>
              <div class="field">
                <label for="login-password" data-i18n="common.password">Password</label>
                <input id="login-password" class="input" type="password" placeholder="••••••••" data-i18n-placeholder="common.password_placeholder" required autocomplete="current-password" />
              </div>
              <div class="auth-meta">
                <a href="/forgot-password" class="text-button" data-i18n="login.forgot.toggle">Forgot password?</a>
              </div>
              <button class="btn-primary auth-submit" type="submit" id="login-btn" data-i18n="login.action.submit">Login</button>
            </form>
            <div class="divider" data-i18n="common.or">or</div>
            <button class="btn-google" type="button" data-google-login>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
              </svg>
              <span data-i18n="login.action.google">Continue with Google</span>
            </button>
          </div>

          <div class="panel" id="panel-register">
            <h1 class="form-title" data-i18n="register.title">Create an account</h1>
            <p class="form-subtitle" data-i18n="register.subtitle">Manage multiple temporary inboxes from one account.</p>
            <div class="alert" id="register-alert"></div>
            <form id="register-form">
              <div class="field">
                <label for="reg-name" data-i18n="register.name">Display name</label>
                <input id="reg-name" class="input" type="text" placeholder="Alex Doe" data-i18n-placeholder="register.name_placeholder" autocomplete="name" />
              </div>
              <div class="field">
                <label for="reg-email" data-i18n="common.email">Email</label>
                <input id="reg-email" class="input" type="email" placeholder="you@example.com" data-i18n-placeholder="common.email_placeholder" required autocomplete="email" />
              </div>
              <div class="field">
                <label for="reg-password" data-i18n="common.password">Password</label>
                <input id="reg-password" class="input" type="password" placeholder="Minimum 6 characters" data-i18n-placeholder="register.password_placeholder" required autocomplete="new-password" minlength="6" />
              </div>
              <button class="btn-primary auth-submit" type="submit" id="register-btn" data-i18n="register.action.submit">Create account</button>
            </form>
            <div class="divider" data-i18n="common.or">or</div>
            <button class="btn-google" type="button" data-google-login>
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
              </svg>
              <span data-i18n="login.action.google">Continue with Google</span>
            </button>
          </div>
        </section>

        <div class="anon-link">
          <span data-i18n="login.anon_prefix">Prefer not to sign in?</span>
          <a href="/" data-i18n="login.anon_link">Use the anonymous inbox</a>
        </div>
      </div>
    </main>

    <div id="google-alert" class="global-alert"></div>

    <script type="module" src="/js/pages/login.js?v=20260324c"></script>
  </body>
</html>
